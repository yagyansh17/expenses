<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Personal Expense Tracker</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;min-height:100vh;max-width:480px;margin:0 auto;color:#fff;}
button{cursor:pointer;font-family:inherit;}
input{font-family:inherit;}
::-webkit-scrollbar{display:none;}

/* SETUP */
.setup-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(145deg,#0f0f1a,#1a1a2e,#16213e);}
.setup-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:36px 24px;width:100%;max-width:400px;text-align:center;backdrop-filter:blur(20px);}
.setup-logo{font-size:56px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;animation:float 3s ease-in-out infinite;line-height:1;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.setup-title{font-size:22px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.setup-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:28px;line-height:1.6;}
.setup-lbl{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:6px;text-align:left;}
.setup-inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);font-size:13px;margin-bottom:14px;background:rgba(255,255,255,.06);color:#fff;outline:none;}
.setup-inp:focus{border-color:#a78bfa;}
.setup-inp::placeholder{color:rgba(255,255,255,.3);}
.signin-btn{width:100%;padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,#a78bfa,#ec4899);color:#fff;font-weight:700;font-size:15px;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 8px 24px rgba(167,139,250,.3);transition:transform .2s,box-shadow .2s;}
.signin-btn:active{transform:scale(.97);}
.setup-hint{font-size:11px;color:rgba(255,255,255,.3);margin-top:16px;line-height:1.7;}
.lock-icon{font-size:11px;color:rgba(167,139,250,.7);margin-top:10px;}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(30,30,50,.95);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);}
.toast.show{opacity:1;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(15,15,26,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:rgba(255,255,255,.5);}

/* HEADER */
.header{background:linear-gradient(145deg,#1a1a2e,#16213e);padding:24px 20px 72px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(167,139,250,.15),transparent 70%);border-radius:50%;}
.header::after{content:'';position:absolute;bottom:-40px;left:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(236,72,153,.1),transparent 70%);border-radius:50%;}
.header-label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase;}
.header-total{font-size:36px;font-weight:800;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:4px;line-height:1;}
.header-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;}
.month-scroll{display:flex;gap:6px;margin-top:16px;overflow-x:auto;padding-bottom:4px;}
.month-btn{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);font-size:12px;white-space:nowrap;background:transparent;color:rgba(255,255,255,.5);}
.month-btn.active{background:linear-gradient(135deg,#a78bfa,#ec4899);color:#fff;font-weight:700;border-color:transparent;}
.user-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border-radius:20px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,.6);margin-top:8px;}

/* CARDS */
.cards{padding:0 14px;margin-top:-44px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;position:relative;z-index:2;}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;backdrop-filter:blur(10px);}
.card-icon{font-size:20px;}
.card-val{font-size:15px;font-weight:700;margin-top:4px;}
.card-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}

/* NAV */
.nav{display:flex;gap:6px;padding:14px 14px 0;}
.nav-btn{flex:1;padding:9px 4px;border-radius:12px;border:1px solid rgba(255,255,255,.08);font-size:11px;font-weight:600;background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);}
.nav-btn.active{background:linear-gradient(135deg,#a78bfa,#ec4899);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(167,139,250,.3);}
.content{padding:14px 14px 80px;}

/* INSIGHTS */
.insight-card{border-radius:16px;padding:14px 16px;margin-bottom:10px;border:1px solid;display:flex;align-items:flex-start;gap:12px;}
.insight-card.warn{background:rgba(251,191,36,.06);border-color:rgba(251,191,36,.2);}
.insight-card.danger{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2);}
.insight-card.good{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);}
.insight-card.info{background:rgba(167,139,250,.06);border-color:rgba(167,139,250,.2);}
.insight-icon{font-size:24px;flex-shrink:0;}
.insight-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.insight-desc{font-size:12px;color:rgba(255,255,255,.55);line-height:1.5;}
.insight-card.warn .insight-title{color:#fbbf24;}
.insight-card.danger .insight-title{color:#ef4444;}
.insight-card.good .insight-title{color:#22c55e;}
.insight-card.info .insight-title{color:#a78bfa;}

/* PAYER SPLIT */
.payer-split{display:flex;gap:10px;margin-bottom:14px;}
.payer-split-card{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;text-align:center;}

/* SECTION CARD */
.section-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:14px;}
.section-title{font-weight:700;font-size:14px;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.bar-row{margin-bottom:12px;}
.bar-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:rgba(255,255,255,.8);}
.bar-track{height:6px;border-radius:4px;background:rgba(255,255,255,.08);}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.empty{text-align:center;color:rgba(255,255,255,.3);font-size:14px;padding:28px 0;line-height:1.8;}

/* EXPENSE ROW */
.exp-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.exp-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.exp-desc{font-weight:600;font-size:14px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exp-meta{font-size:11px;color:rgba(255,255,255,.4);}
.exp-payer{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:3px;letter-spacing:.3px;}
.action-btn{font-size:11px;padding:3px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);}
.del-btn{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#ef4444;}

/* FORM */
.form-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:20px;}
.form-title{font-weight:800;font-size:17px;color:#fff;margin-bottom:16px;}
.lbl{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.inp{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);font-size:14px;margin-bottom:14px;background:rgba(255,255,255,.06);color:#fff;outline:none;}
.inp:focus{border-color:#a78bfa;}
.inp::placeholder{color:rgba(255,255,255,.25);}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.cat-btn{padding:9px 10px;border-radius:12px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);font-size:12px;font-weight:600;color:rgba(255,255,255,.5);text-align:left;transition:all .2s;}
.payer-grid{display:flex;gap:8px;margin-bottom:14px;}
.payer-btn{flex:1;padding:11px;border-radius:14px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);font-size:13px;font-weight:700;color:rgba(255,255,255,.5);text-align:center;transition:all .2s;}
.btn-row{display:flex;gap:10px;margin-top:8px;}
.btn-cancel{flex:1;padding:13px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-weight:600;color:rgba(255,255,255,.6);font-size:14px;}
.btn-save{flex:2;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#a78bfa,#ec4899);color:#fff;font-weight:800;font-size:15px;box-shadow:0 6px 20px rgba(167,139,250,.3);}

/* CHIPS */
.chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;}
.chip{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:11px;white-space:nowrap;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px;}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;border:none;background:linear-gradient(135deg,#a78bfa,#ec4899);color:#fff;font-size:28px;box-shadow:0 6px 20px rgba(167,139,250,.4);z-index:97;transition:transform .2s;}
.fab:active{transform:scale(.93);}
.sync-btn{position:fixed;bottom:26px;left:24px;width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);font-size:18px;box-shadow:0 2px 10px rgba(0,0,0,.3);z-index:97;backdrop-filter:blur(10px);}

/* STREAK */
.streak-bar{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.streak-dot{width:10px;height:10px;border-radius:50%;}

/* SIGN OUT */
.signout-btn{padding:4px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-size:11px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
// ── SIMPLE OBFUSCATION (keeps IDs off plain sight) ────
function enc(s){return btoa(unescape(encodeURIComponent(s)));}
function dec(s){try{return decodeURIComponent(escape(atob(s)));}catch{return s;}}

const _D={
  c:enc("228354843386-cc1tdkhsgn33386knd855em1sjjgg86t.apps.googleusercontent.com"),
  s:enc("121wpQx5SM-ClNVww_S9wyMMDsfExGWwO5FiQYxNxJAk")
};

const PAYERS=["Yagyansh","Tanu","Both"];
const PC={Yagyansh:"#a78bfa",Tanu:"#ec4899",Both:"#34d399"};
const CATS=[
  {id:"grocery",label:"Grocery",icon:"🛒",color:"#34d399"},
  {id:"fruits",label:"Fruits & Veggies",icon:"🍎",color:"#fb923c"},
  {id:"dineout",label:"Dine Out",icon:"🍽️",color:"#ec4899"},
  {id:"rent",label:"Rent",icon:"🏠",color:"#a78bfa"},
  {id:"utility",label:"Utility Bills",icon:"⚡",color:"#60a5fa"},
  {id:"supplements",label:"Supplements",icon:"💪",color:"#2dd4bf"},
  {id:"transport",label:"Transport",icon:"🚗",color:"#f97316"},
  {id:"medical",label:"Medical",icon:"💊",color:"#f87171"},
  {id:"entertainment",label:"Entertainment",icon:"🎬",color:"#94a3b8"},
  {id:"other",label:"Other",icon:"📦",color:"#a8a29e"},
];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const SHEET_NAME="Expenses";
const HEADER=["ID","Date","Description","Amount","Category","Payer","Note"];

let CFG={clientId:dec(_D.c),sheetId:dec(_D.s)};
// override from localStorage if user customized
const saved=JSON.parse(localStorage.getItem("yt_cfg3")||"{}");
if(saved.clientId) CFG.clientId=saved.clientId;
if(saved.sheetId) CFG.sheetId=saved.sheetId;

let accessToken=null,tokenExpiry=0,tokenClient=null;
let state={
  expenses:[],view:"setup",
  filterMonth:new Date().getMonth(),filterYear:new Date().getFullYear(),
  editId:null,histSearch:"",histCat:"all",histPayer:"all",userEmail:""
};
let _selCat="grocery",_selPayer="Yagyansh";

// ── UTILS ──────────────────────────────────────────────
const today=()=>new Date().toISOString().split("T")[0];
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmt=n=>"₹"+Number(n).toLocaleString("en-IN");
const catOf=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];

function showToast(msg,dur=3000){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),dur);
}
function setLoading(on,msg="Loading..."){
  let el=document.getElementById("lo");
  if(on){if(!el){el=document.createElement("div");el.id="lo";el.className="loading-overlay";document.body.appendChild(el);}
    el.innerHTML=`<div class="spinner"></div><div class="loading-txt">${msg}</div>`;}
  else{if(el)el.remove();}
}

// ── OAUTH ──────────────────────────────────────────────
function initTokenClient(){
  return new Promise(res=>{
    const iv=setInterval(()=>{
      if(window.google){clearInterval(iv);
        const c=google.accounts.oauth2.initTokenClient({
          client_id:CFG.clientId,
          scope:"https://www.googleapis.com/auth/spreadsheets",
          callback:(r)=>{
            if(r.error){showToast("❌ Auth failed: "+r.error);return;}
            accessToken=r.access_token;
            tokenExpiry=Date.now()+((r.expires_in-60)*1000);
            // get email from token info
            fetch(`https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=${accessToken}`)
              .then(x=>x.json()).then(x=>{state.userEmail=x.email||"";loadExpenses();});
          }
        });res(c);}
    },200);
  });
}

async function signIn(){
  if(!tokenClient)tokenClient=await initTokenClient();
  tokenClient.requestAccessToken();
}
async function ensureToken(){
  if(accessToken&&Date.now()<tokenExpiry)return true;
  if(!tokenClient)tokenClient=await initTokenClient();
  return new Promise(res=>{
    tokenClient.callback=(r)=>{
      if(r.error){showToast("❌ Session expired. Sign in again.");res(false);return;}
      accessToken=r.access_token;tokenExpiry=Date.now()+((r.expires_in-60)*1000);res(true);
    };
    tokenClient.requestAccessToken({prompt:""});
  });
}
function signOut(){
  accessToken=null;tokenClient=null;state.view="setup";state.expenses=[];state.userEmail="";render();
}

// ── SHEETS ─────────────────────────────────────────────
const BASE="https://sheets.googleapis.com/v4/spreadsheets";
const hdrs=()=>({Authorization:"Bearer "+accessToken,"Content-Type":"application/json"});
async function apiGet(r){const x=await fetch(`${BASE}/${CFG.sheetId}/values/${encodeURIComponent(r)}`,{headers:hdrs()});if(!x.ok)throw new Error(await x.text());return x.json();}
async function apiAppend(v){const x=await fetch(`${BASE}/${CFG.sheetId}/values/${encodeURIComponent(SHEET_NAME)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,{method:"POST",headers:hdrs(),body:JSON.stringify({values:v})});if(!x.ok)throw new Error(await x.text());return x.json();}
async function apiUpdate(r,v){const x=await fetch(`${BASE}/${CFG.sheetId}/values/${encodeURIComponent(r)}?valueInputOption=RAW`,{method:"PUT",headers:hdrs(),body:JSON.stringify({values:v})});if(!x.ok)throw new Error(await x.text());return x.json();}
async function apiClear(r){const x=await fetch(`${BASE}/${CFG.sheetId}/values/${encodeURIComponent(r)}:clear`,{method:"POST",headers:hdrs()});if(!x.ok)throw new Error(await x.text());return x.json();}

async function loadExpenses(){
  setLoading(true,"Fetching your expenses...");
  state.view="dashboard";
  try{
    const d=await apiGet(`${SHEET_NAME}!A1:G`);
    const rows=d.values||[];
    if(!rows.length||rows[0][0]!=="ID"){await apiUpdate(`${SHEET_NAME}!A1:G1`,[HEADER]);state.expenses=[];}
    else state.expenses=rows.slice(1).filter(r=>r[0]).map(r=>({id:r[0],date:r[1]||today(),desc:r[2]||"",amount:parseFloat(r[3])||0,cat:r[4]||"other",payer:r[5]||"Yagyansh",note:r[6]||""})).reverse();
  }catch(e){showToast("❌ Load failed: "+e.message);}
  setLoading(false);render();
}
async function addExpense(exp){
  if(!await ensureToken())return;
  setLoading(true,"Saving...");
  try{await apiAppend([[exp.id,exp.date,exp.desc,exp.amount,exp.cat,exp.payer,exp.note||""]]);state.expenses=[exp,...state.expenses];state.view="dashboard";showToast("✅ Saved!");}
  catch(e){showToast("❌ "+e.message);}
  setLoading(false);render();
}
async function updateExpense(exp){
  if(!await ensureToken())return;
  setLoading(true,"Updating...");
  try{const d=await apiGet(`${SHEET_NAME}!A1:G`);const rows=d.values||[];const i=rows.findIndex(r=>r[0]===exp.id);if(i>0)await apiUpdate(`${SHEET_NAME}!A${i+1}:G${i+1}`,[[exp.id,exp.date,exp.desc,exp.amount,exp.cat,exp.payer,exp.note||""]]);state.expenses=state.expenses.map(e=>e.id===exp.id?exp:e);state.view="history";state.editId=null;showToast("✅ Updated!");}
  catch(e){showToast("❌ "+e.message);}
  setLoading(false);render();
}
async function deleteExpense(id){
  if(!await ensureToken())return;
  setLoading(true,"Deleting...");
  try{const d=await apiGet(`${SHEET_NAME}!A1:G`);const rows=(d.values||[]).filter(r=>r[0]!==id);await apiClear(`${SHEET_NAME}!A1:G`);await apiUpdate(`${SHEET_NAME}!A1:G${Math.max(rows.length,1)}`,rows.length?rows:[HEADER]);state.expenses=state.expenses.filter(e=>e.id!==id);showToast("🗑️ Deleted!");}
  catch(e){showToast("❌ "+e.message);}
  setLoading(false);render();
}

// ── INSIGHTS ENGINE ────────────────────────────────────
function generateInsights(expenses){
  const insights=[];
  const now=new Date();
  const thisMonth=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const lastMonthExp=expenses.filter(e=>{const d=new Date(e.date);const lm=new Date(now.getFullYear(),now.getMonth()-1,1);return d.getMonth()===lm.getMonth()&&d.getFullYear()===lm.getFullYear();});

  // 1. Dine out check
  const dineTotal=thisMonth.filter(e=>e.cat==="dineout").reduce((s,e)=>s+e.amount,0);
  const totalMonth=thisMonth.reduce((s,e)=>s+e.amount,0);
  if(dineTotal>0&&totalMonth>0){
    const pct=(dineTotal/totalMonth*100).toFixed(0);
    if(pct>20) insights.push({type:"danger",icon:"🍽️",title:`Dine-out is ${pct}% of your spending!`,desc:`You've spent ${fmt(dineTotal)} eating out this month. Consider cooking at home more often to save up.`});
    else if(pct>10) insights.push({type:"warn",icon:"🍽️",title:"Dine-out spending rising",desc:`${fmt(dineTotal)} spent dining out this month (${pct}% of total). Keep an eye on this!`});
  }

  // 2. Fruits check — last 7 days
  const last7=new Date(now-7*24*60*60*1000).toISOString().split("T")[0];
  const recentFruits=expenses.filter(e=>e.cat==="fruits"&&e.date>=last7);
  if(!recentFruits.length) insights.push({type:"warn",icon:"🍎",title:"No fruits & veggies this week!",desc:"You haven't logged any fruits or vegetables in 7 days. A healthy diet keeps your expenses in check too!"});

  // 3. Entertainment check
  const entTotal=thisMonth.filter(e=>e.cat==="entertainment").reduce((s,e)=>s+e.amount,0);
  if(entTotal>2000) insights.push({type:"warn",icon:"🎬",title:"Entertainment spending high",desc:`${fmt(entTotal)} on entertainment this month. Worth reviewing if all of it was necessary.`});

  // 4. Month over month comparison
  if(lastMonthExp.length>0){
    const lastTotal=lastMonthExp.reduce((s,e)=>s+e.amount,0);
    if(totalMonth>lastTotal*1.2){
      const diff=totalMonth-lastTotal;
      insights.push({type:"danger",icon:"📈",title:`Spending up ${((totalMonth/lastTotal-1)*100).toFixed(0)}% vs last month`,desc:`You've spent ${fmt(diff)} more than last month. Check which categories jumped up.`});
    } else if(totalMonth<lastTotal*0.9){
      insights.push({type:"good",icon:"🎉",title:"Great job! Spending down this month",desc:`You're spending less than last month. Keep it up — you're on track!`});
    }
  }

  // 5. Supplements check — last 10 days
  const last10=new Date(now-10*24*60*60*1000).toISOString().split("T")[0];
  const recentSupp=expenses.filter(e=>e.cat==="supplements"&&e.date>=last10);
  if(!recentSupp.length&&expenses.some(e=>e.cat==="supplements"))
    insights.push({type:"info",icon:"💪",title:"Supplements not logged recently",desc:"You haven't added supplement expenses in 10 days. Don't forget to log them or are you skipping them?"});

  // 6. Grocery streak check
  const groceryDays=new Set(thisMonth.filter(e=>e.cat==="grocery").map(e=>e.date));
  if(groceryDays.size>=4) insights.push({type:"good",icon:"🛒",title:"Consistent grocery shopping!",desc:`${groceryDays.size} grocery trips this month. Home cooking is the best way to control spending!`});

  // 7. No expenses today
  const todayExp=expenses.filter(e=>e.date===today());
  if(!todayExp.length) insights.push({type:"info",icon:"📝",title:"No expenses logged today",desc:"Don't forget to log your daily expenses to keep your tracker accurate!"});

  // 8. Balanced spending
  if(insights.filter(i=>i.type==="danger"||i.type==="warn").length===0&&thisMonth.length>5)
    insights.push({type:"good",icon:"✨",title:"Your spending looks balanced!",desc:"No major red flags this month. Keep tracking consistently to stay on top of your finances."});

  return insights.slice(0,5);
}

// ── RENDER ─────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(state.view==="setup"||!accessToken){renderSetup();return;}
  const fe=filtered();
  const total=fe.reduce((s,e)=>s+e.amount,0);
  const todayExp=state.expenses.filter(e=>e.date===today());
  const todayTotal=todayExp.reduce((s,e)=>s+e.amount,0);
  const yT=fe.filter(e=>e.payer==="Yagyansh").reduce((s,e)=>s+e.amount,0);
  const tT=fe.filter(e=>e.payer==="Tanu").reduce((s,e)=>s+e.amount,0);
  const greeting=()=>{const h=new Date().getHours();if(h<12)return"Good morning";if(h<17)return"Good afternoon";return"Good evening";};

  let html=`<div class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1">
      <div>
        <div class="header-label">Personal Expense Tracker</div>
        <div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:2px">${greeting()}, Yagyansh & Tanu 👋</div>
        <div class="header-total">${fmt(total)}</div>
        <div class="header-sub">${MONTHS[state.filterMonth]} ${state.filterYear} · ${fe.length} transactions</div>
        ${state.userEmail?`<div class="user-pill">🔐 ${state.userEmail}</div>`:""}
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:rgba(255,255,255,.4)">Today</div>
        <div style="font-size:20px;font-weight:700;color:#a78bfa">${fmt(todayTotal)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.35)">${todayExp.length} txn${todayExp.length!==1?"s":""}</div>
        <button class="signout-btn" onclick="signOut()" style="margin-top:8px">Sign out</button>
      </div>
    </div>
    <div class="month-scroll" style="position:relative;z-index:1">${MONTHS.map((m,i)=>`<button class="month-btn${state.filterMonth===i?" active":""}" onclick="setMonth(${i})">${m}</button>`).join("")}</div>
  </div>

  <div class="cards">
    <div class="card"><div class="card-icon">📅</div><div class="card-val">${fmt(total)}</div><div class="card-lbl">This Month</div></div>
    <div class="card"><div class="card-icon">👤</div><div class="card-val" style="color:#a78bfa">${fmt(yT)}</div><div class="card-lbl">Yagyansh</div></div>
    <div class="card"><div class="card-icon">👩</div><div class="card-val" style="color:#ec4899">${fmt(tT)}</div><div class="card-lbl">Tanu</div></div>
  </div>

  <div class="nav">
    <button class="nav-btn${state.view==="dashboard"?" active":""}" onclick="setView('dashboard')">🏠 Home</button>
    <button class="nav-btn${state.view==="insights"?" active":""}" onclick="setView('insights')">💡 Insights</button>
    <button class="nav-btn${state.view==="history"?" active":""}" onclick="setView('history')">📋 History</button>
    <button class="nav-btn${state.view==="stats"?" active":""}" onclick="setView('stats')">📊 Stats</button>
  </div>
  <div class="content">`;

  if(state.view==="dashboard") html+=renderDashboard(fe,todayExp,yT,tT,total);
  else if(state.view==="add") html+=renderAddForm();
  else if(state.view==="insights") html+=renderInsightsView();
  else if(state.view==="history") html+=renderHistory(fe);
  else if(state.view==="stats") html+=renderStats(fe,total);
  html+=`</div>`;
  if(state.view!=="add"){
    html+=`<button class="fab" onclick="setView('add')">+</button>`;
    html+=`<button class="sync-btn" onclick="syncNow()">🔄</button>`;
  }
  app.innerHTML=html;
}

  document.getElementById("app").innerHTML=`
  <div class="setup-wrap">
    <div class="setup-card">
      <div class="setup-logo">₹</div>
      <div class="setup-title">Personal Expense Tracker</div>
      <div class="setup-sub">Yagyansh & Tanu<br/>Your private family finance tracker</div>
      <button class="signin-btn" onclick="signIn()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.8 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.3-.2-2.7-.5-4z"/></svg>
        Sign in with Google
      </button>
      <div class="lock-icon">🔒 Secured with Google OAuth · Private to Yagyansh & Tanu</div>
    </div>
  </div>`;
}

function renderDashboard(fe,todayExp,yT,tT,total){
  const ct=CATS.map(c=>({...c,total:fe.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const max=ct[0]?.total||1;
  const insights=generateInsights(state.expenses);
  const topInsight=insights[0];

  let h=``;

  // Top insight preview
  if(topInsight) h+=`<div class="insight-card ${topInsight.type}" onclick="setView('insights')" style="cursor:pointer;margin-bottom:14px">
    <div class="insight-icon">${topInsight.icon}</div>
    <div><div class="insight-title">${topInsight.title}</div><div class="insight-desc">${topInsight.desc}</div>
    <div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:6px">Tap to see all insights →</div></div>
  </div>`;

  h+=`<div class="payer-split">
    <div class="payer-split-card">
      <div style="font-size:24px">👤</div>
      <div style="font-size:13px;font-weight:700;color:#a78bfa;margin-top:4px">Yagyansh</div>
      <div style="font-size:18px;font-weight:800;color:#a78bfa">${fmt(yT)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.35)">${fe.filter(e=>e.payer==="Yagyansh").length} entries</div>
    </div>
    <div class="payer-split-card">
      <div style="font-size:24px">👩</div>
      <div style="font-size:13px;font-weight:700;color:#ec4899;margin-top:4px">Tanu</div>
      <div style="font-size:18px;font-weight:800;color:#ec4899">${fmt(tT)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,.35)">${fe.filter(e=>e.payer==="Tanu").length} entries</div>
    </div>
  </div>`;

  if(ct.length){
    h+=`<div class="section-card"><div class="section-title">🏷️ Top Categories</div>`;
    ct.slice(0,5).forEach(c=>{h+=`<div class="bar-row"><div class="bar-meta"><span>${c.icon} ${c.label}</span><span style="font-weight:700">${fmt(c.total)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(c.total/max*100).toFixed(1)}%;background:${c.color}"></div></div></div>`;});
    h+=`</div>`;
  }

  h+=`<div class="section-card"><div class="section-title">🕐 Today's Transactions</div>`;
  if(!todayExp.length) h+=`<div class="empty">Nothing logged today yet.<br/>Tap <b>+</b> to add your first expense!</div>`;
  else todayExp.forEach(e=>{h+=expRow(e);});
  h+=`</div>`;
  return h;
}

function renderInsightsView(){
  const insights=generateInsights(state.expenses);
  let h=`<div style="margin-bottom:14px"><div style="font-size:16px;font-weight:800;color:#fff">💡 Smart Insights</div><div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:2px">Personalized tips based on your spending</div></div>`;
  if(!insights.length) h+=`<div class="empty">Add more expenses to get insights!</div>`;
  else insights.forEach(i=>{h+=`<div class="insight-card ${i.type}"><div class="insight-icon">${i.icon}</div><div><div class="insight-title">${i.title}</div><div class="insight-desc">${i.desc}</div></div></div>`;});

  // Spending habit score
  const score=Math.min(100,Math.max(0,100-insights.filter(i=>i.type==="danger").length*25-insights.filter(i=>i.type==="warn").length*10));
  const scoreColor=score>=80?"#34d399":score>=50?"#fbbf24":"#ef4444";
  h+=`<div class="section-card" style="text-align:center;margin-top:4px">
    <div class="section-title" style="justify-content:center">🏆 Spending Health Score</div>
    <div style="font-size:48px;font-weight:800;color:${scoreColor}">${score}</div>
    <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">${score>=80?"Excellent! Keep it up 🎉":score>=50?"Room for improvement 💪":"Needs attention ⚠️"}</div>
    <div style="background:rgba(255,255,255,.06);border-radius:10px;height:8px;margin-top:14px;overflow:hidden">
      <div style="height:100%;width:${score}%;background:${scoreColor};border-radius:10px;transition:width .8s"></div>
    </div>
  </div>`;
  return h;
}

function renderAddForm(){
  const e=state.editId?state.expenses.find(x=>x.id===state.editId):null;
  if(e){_selCat=e.cat;_selPayer=e.payer;}
  const desc=e?.desc||"",amt=e?.amount||"",dt=e?.date||today(),note=e?.note||"";
  return `<div class="form-card">
    <div class="form-title">${e?"✏️ Edit Expense":"➕ New Expense"}</div>
    <div class="lbl">Description</div>
    <input class="inp" id="f_desc" value="${desc}" placeholder="e.g. BigBasket groceries"/>
    <div class="lbl">Amount (₹)</div>
    <input class="inp" id="f_amt" type="number" value="${amt}" placeholder="0.00"/>
    <div class="lbl">Paid By</div>
    <div class="payer-grid">${PAYERS.map(p=>`<button class="payer-btn" id="pb_${p}" style="border-color:${_selPayer===p?PC[p]:"rgba(255,255,255,.08)"};background:${_selPayer===p?PC[p]+"22":"rgba(255,255,255,.04)"};color:${_selPayer===p?PC[p]:"rgba(255,255,255,.5)"}" onclick="selPayer('${p}')">${p}</button>`).join("")}</div>
    <div class="lbl">Category</div>
    <div class="cat-grid">${CATS.map(c=>`<button class="cat-btn" id="cb_${c.id}" style="border-color:${_selCat===c.id?c.color:"rgba(255,255,255,.08)"};background:${_selCat===c.id?c.color+"22":"rgba(255,255,255,.04)"};color:${_selCat===c.id?c.color:"rgba(255,255,255,.5)"}" onclick="selCat('${c.id}')">${c.icon} ${c.label}</button>`).join("")}</div>
    <div class="lbl">Date</div>
    <input class="inp" id="f_date" type="date" value="${dt}"/>
    <div class="lbl">Note (optional)</div>
    <input class="inp" id="f_note" value="${note}" placeholder="Any note..."/>
    <div class="btn-row">
      <button class="btn-cancel" onclick="setView('dashboard')">Cancel</button>
      <button class="btn-save" onclick="saveExpense('${e?.id||""}')">${e?"Update":"Save Expense"}</button>
    </div>
  </div>`;
}

function renderHistory(fe){
  let list=fe.filter(e=>{const sc=state.histSearch.toLowerCase();return(state.histCat==="all"||e.cat===state.histCat)&&(state.histPayer==="all"||e.payer===state.histPayer)&&(e.desc.toLowerCase().includes(sc)||(e.note||"").toLowerCase().includes(sc));});
  let h=`<input class="inp" style="margin-bottom:10px" placeholder="🔍 Search expenses..." value="${state.histSearch}" oninput="setHS(this.value)"/>
  <div class="chips"><button class="chip" style="${state.histPayer==="all"?"border-color:#a78bfa;background:rgba(167,139,250,.15);color:#a78bfa":""}" onclick="setHP('all')">All</button>${PAYERS.map(p=>`<button class="chip" style="${state.histPayer===p?`border-color:${PC[p]};background:${PC[p]}22;color:${PC[p]}`:""}" onclick="setHP('${p}')">${p}</button>`).join("")}</div>
  <div class="chips"><button class="chip" style="${state.histCat==="all"?"border-color:#a78bfa;background:rgba(167,139,250,.15);color:#a78bfa":""}" onclick="setHC('all')">All</button>${CATS.map(c=>`<button class="chip" style="${state.histCat===c.id?`border-color:${c.color};background:${c.color}22;color:${c.color}`:""}" onclick="setHC('${c.id}')">${c.icon} ${c.label}</button>`).join("")}</div>
  <div class="section-card" style="padding:4px 16px">`;
  if(!list.length) h+=`<div class="empty">No expenses found.</div>`;
  else list.forEach(e=>{h+=expRow(e);});
  h+=`</div>`;
  return h;
}

function renderStats(fe,total){
  const ct=CATS.map(c=>({...c,total:fe.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const days={};fe.forEach(e=>{days[e.date]=(days[e.date]||0)+e.amount;});
  const avg=Object.keys(days).length?(total/Object.keys(days).length).toFixed(0):0;
  const yT=fe.filter(e=>e.payer==="Yagyansh").reduce((s,e)=>s+e.amount,0);
  const tT=fe.filter(e=>e.payer==="Tanu").reduce((s,e)=>s+e.amount,0);
  const bT=fe.filter(e=>e.payer==="Both").reduce((s,e)=>s+e.amount,0);
  return `<div class="stats-grid">
    <div class="stat-card"><div style="font-size:22px">💸</div><div style="font-size:18px;font-weight:800;margin-top:6px">${fmt(total)}</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">Total Spent</div></div>
    <div class="stat-card"><div style="font-size:22px">📆</div><div style="font-size:18px;font-weight:800;margin-top:6px">${fmt(avg)}</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">Daily Average</div></div>
    <div class="stat-card"><div style="font-size:22px">🧾</div><div style="font-size:18px;font-weight:800;margin-top:6px">${fe.length}</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">Transactions</div></div>
    <div class="stat-card"><div style="font-size:22px">📅</div><div style="font-size:18px;font-weight:800;margin-top:6px">${Object.keys(days).length}</div><div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:2px">Active Days</div></div>
  </div>
  <div class="section-card"><div class="section-title">👤 Who Paid More?</div>
    ${[["Yagyansh",yT,"#a78bfa","👤"],["Tanu",tT,"#ec4899","👩"],["Both",bT,"#34d399","👫"]].map(([n,v,c,ic])=>`<div class="bar-row"><div class="bar-meta"><span>${ic} ${n}</span><span style="font-weight:700;color:${c}">${fmt(v)} <span style="color:rgba(255,255,255,.3);font-weight:400">(${total?(v/total*100).toFixed(1):0}%)</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${total?(v/total*100).toFixed(1):0}%;background:${c}"></div></div></div>`).join("")}
  </div>
  <div class="section-card"><div class="section-title">🏷️ By Category</div>
    ${!ct.length?'<div class="empty">No data yet.</div>':ct.map(c=>`<div class="bar-row"><div class="bar-meta"><span>${c.icon} ${c.label}</span><span style="font-weight:700">${fmt(c.total)} <span style="color:rgba(255,255,255,.3);font-weight:400">(${total?(c.total/total*100).toFixed(1):0}%)</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${total?(c.total/total*100).toFixed(1):0}%;background:${c.color}"></div></div></div>`).join("")}
  </div>
  ${Object.keys(days).length?`<div class="section-card"><div class="section-title">🔥 Top Spending Days</div>${Object.entries(days).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([d,v])=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px"><span style="color:rgba(255,255,255,.6)">${new Date(d).toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</span><span style="font-weight:700">${fmt(v)}</span></div>`).join("")}</div>`:""}`;
}

function expRow(e){
  const c=catOf(e.cat);const pc=PC[e.payer]||"#999";
  return `<div class="exp-row">
    <div class="exp-icon" style="background:${c.color}18">${c.icon}</div>
    <div style="flex:1;min-width:0">
      <div class="exp-desc">${e.desc}</div>
      <div class="exp-meta">${new Date(e.date).toLocaleDateString("en-IN",{day:"numeric",month:"short"})} · ${c.label}</div>
      ${e.note?`<div style="font-size:11px;color:rgba(255,255,255,.3);font-style:italic">${e.note}</div>`:""}
      <span class="exp-payer" style="background:${pc}18;color:${pc}">${e.payer}</span>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-weight:800;font-size:15px">${fmt(e.amount)}</div>
      <div style="display:flex;gap:5px;margin-top:5px;justify-content:flex-end">
        <button class="action-btn" onclick="editExp('${e.id}')">✏️</button>
        <button class="action-btn del-btn" onclick="delExp('${e.id}')">🗑️</button>
      </div>
    </div>
  </div>`;
}

// ── ACTIONS ────────────────────────────────────────────
const filtered=()=>state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===state.filterMonth&&d.getFullYear()===state.filterYear;});
function setMonth(m){state.filterMonth=m;render();}
function setView(v){state.view=v;if(v==="add"&&!state.editId){_selCat="grocery";_selPayer="Yagyansh";}if(v!=="add")state.editId=null;render();}
function setHS(v){state.histSearch=v;render();}
function setHC(v){state.histCat=v;render();}
function setHP(v){state.histPayer=v;render();}
function selCat(id){_selCat=id;CATS.forEach(c=>{const b=document.getElementById("cb_"+c.id);if(!b)return;b.style.borderColor=c.id===id?c.color:"rgba(255,255,255,.08)";b.style.background=c.id===id?c.color+"22":"rgba(255,255,255,.04)";b.style.color=c.id===id?c.color:"rgba(255,255,255,.5)";});}
function selPayer(p){_selPayer=p;PAYERS.forEach(x=>{const b=document.getElementById("pb_"+x);if(!b)return;b.style.borderColor=x===p?PC[x]:"rgba(255,255,255,.08)";b.style.background=x===p?PC[x]+"22":"rgba(255,255,255,.04)";b.style.color=x===p?PC[x]:"rgba(255,255,255,.5)";});}
async function saveExpense(editId){
  const desc=document.getElementById("f_desc")?.value?.trim();
  const amt=parseFloat(document.getElementById("f_amt")?.value);
  const date=document.getElementById("f_date")?.value;
  const note=document.getElementById("f_note")?.value?.trim()||"";
  if(!desc){showToast("⚠️ Enter a description.");return;}
  if(!amt||amt<=0){showToast("⚠️ Enter a valid amount.");return;}
  const exp={id:editId||genId(),desc,amount:amt,cat:_selCat,date,note,payer:_selPayer};
  if(editId)await updateExpense(exp);else await addExpense(exp);
}
function editExp(id){state.editId=id;state.view="add";render();}
async function delExp(id){if(!confirm("Delete this expense?"))return;await deleteExpense(id);}
async function syncNow(){await loadExpenses();showToast("🔄 Synced!");}

render();
</script>
