<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>💰 Expense Tracker</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',sans-serif;background:#f5f6fa;min-height:100vh;max-width:480px;margin:0 auto;}
button{cursor:pointer;font-family:inherit;}
input{font-family:inherit;}
::-webkit-scrollbar{display:none;}
.setup-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#667eea,#764ba2);}
.setup-card{background:#fff;border-radius:24px;padding:32px 24px;box-shadow:0 8px 32px rgba(0,0,0,.15);width:100%;max-width:400px;text-align:center;}
.setup-logo{font-size:48px;margin-bottom:10px;}
.setup-title{font-size:22px;font-weight:700;color:#333;margin-bottom:6px;}
.setup-sub{font-size:13px;color:#888;margin-bottom:28px;line-height:1.6;}
.setup-lbl{font-size:12px;font-weight:600;color:#666;margin-bottom:6px;text-align:left;}
.setup-inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #eee;font-size:13px;margin-bottom:14px;background:#fafafa;color:#333;outline:none;text-align:left;}
.setup-inp:focus{border-color:#667eea;}
.signin-btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700;font-size:15px;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:10px;}
.setup-hint{font-size:11px;color:#bbb;margin-top:16px;line-height:1.7;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:998;gap:12px;}
.spinner{width:36px;height:36px;border:4px solid #eee;border-top-color:#667eea;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:#777;}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px 20px 64px;}
.month-scroll{display:flex;gap:6px;margin-top:14px;overflow-x:auto;padding-bottom:4px;}
.month-btn{padding:4px 12px;border-radius:20px;border:none;font-size:12px;white-space:nowrap;background:rgba(255,255,255,.2);color:#fff;}
.month-btn.active{background:#fff;color:#764ba2;font-weight:700;}
.cards{padding:0 14px;margin-top:-38px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.card{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.nav{display:flex;gap:8px;padding:14px 14px 0;}
.nav-btn{flex:1;padding:8px 4px;border-radius:10px;border:none;font-size:12px;font-weight:600;background:#fff;color:#555;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.nav-btn.active{background:#667eea;color:#fff;}
.content{padding:14px;}
.form-card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.lbl{font-size:12px;font-weight:600;color:#777;margin-bottom:5px;}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #eee;font-size:14px;margin-bottom:12px;background:#fafafa;color:#333;outline:none;}
.inp:focus{border-color:#667eea;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.cat-btn{padding:8px 10px;border-radius:10px;border:2px solid #eee;background:#fafafa;font-size:12px;font-weight:600;color:#555;text-align:left;}
.payer-grid{display:flex;gap:8px;margin-bottom:12px;}
.payer-btn{flex:1;padding:10px;border-radius:12px;border:2px solid #eee;background:#fafafa;font-size:13px;font-weight:600;color:#555;text-align:center;}
.btn-row{display:flex;gap:10px;margin-top:6px;}
.btn-cancel{flex:1;padding:12px;border-radius:12px;border:1px solid #ddd;background:#f5f5f5;font-weight:600;color:#555;}
.btn-save{flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:700;font-size:15px;}
.exp-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f5f5f5;}
.exp-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.exp-payer{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-block;margin-top:3px;}
.action-btn{font-size:11px;padding:2px 7px;border-radius:6px;border:1px solid #ddd;background:#f5f5f5;color:#666;}
.del-btn{border-color:#fdd;background:#fff5f5;color:#e53935;}
.chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;}
.chip{padding:5px 12px;border-radius:20px;border:1.5px solid #ddd;background:#fff;color:#666;font-size:11px;white-space:nowrap;}
.section-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.section-title{font-weight:700;font-size:14px;color:#333;margin-bottom:12px;}
.bar-row{margin-bottom:11px;}
.bar-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.bar-track{height:8px;border-radius:4px;background:#f0f0f0;}
.bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.empty{text-align:center;color:#bbb;font-size:14px;padding:28px 0;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.payer-split{display:flex;gap:10px;margin-bottom:14px;}
.payer-split-card{flex:1;background:#fff;border-radius:14px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:28px;box-shadow:0 4px 16px rgba(102,126,234,.5);z-index:97;}
.sync-btn{position:fixed;bottom:24px;left:24px;width:46px;height:46px;border-radius:50%;border:none;background:#fff;font-size:20px;box-shadow:0 2px 10px rgba(0,0,0,.15);z-index:97;}
.user-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:12px;margin-top:8px;}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
const PAYERS=["Yagyansh","Tanu","Both"];
const PC={Yagyansh:"#667eea",Tanu:"#e91e8c",Both:"#4CAF50"};
const CATS=[
  {id:"grocery",label:"Grocery",icon:"🛒",color:"#4CAF50"},
  {id:"fruits",label:"Fruits & Veggies",icon:"🍎",color:"#FF9800"},
  {id:"dineout",label:"Dine Out",icon:"🍽️",color:"#E91E63"},
  {id:"rent",label:"Rent",icon:"🏠",color:"#9C27B0"},
  {id:"utility",label:"Utility Bills",icon:"⚡",color:"#2196F3"},
  {id:"supplements",label:"Supplements",icon:"💪",color:"#00BCD4"},
  {id:"transport",label:"Transport",icon:"🚗",color:"#FF5722"},
  {id:"medical",label:"Medical",icon:"💊",color:"#F44336"},
  {id:"entertainment",label:"Entertainment",icon:"🎬",color:"#607D8B"},
  {id:"other",label:"Other",icon:"📦",color:"#795548"},
];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const SHEET_NAME="Expenses";
const HEADER=["ID","Date","Description","Amount","Category","Payer","Note"];

let CFG=JSON.parse(localStorage.getItem("yt_cfg2")||"{}");
// CFG = { clientId, sheetId }
let accessToken=null;
let tokenExpiry=0;
let state={
  expenses:[],view:"setup",
  filterMonth:new Date().getMonth(),filterYear:new Date().getFullYear(),
  editId:null,histSearch:"",histCat:"all",histPayer:"all",
  userEmail:""
};
let _selCat="grocery",_selPayer="Yagyansh";

// ── UTILS ──────────────────────────────────────────────
const today=()=>new Date().toISOString().split("T")[0];
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const fmt=n=>"₹"+Number(n).toLocaleString("en-IN");
const catOf=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];

function showToast(msg,dur=3000){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),dur);
}
function setLoading(on,msg="Loading..."){
  let el=document.getElementById("lo");
  if(on){
    if(!el){el=document.createElement("div");el.id="lo";el.className="loading-overlay";document.body.appendChild(el);}
    el.innerHTML=`<div class="spinner"></div><div class="loading-txt">${msg}</div>`;
  } else { if(el)el.remove(); }
}

// ── OAUTH ──────────────────────────────────────────────
function initTokenClient(){
  return new Promise(res=>{
    const interval=setInterval(()=>{
      if(window.google){
        clearInterval(interval);
        const client=google.accounts.oauth2.initTokenClient({
          client_id:CFG.clientId,
          scope:"https://www.googleapis.com/auth/spreadsheets",
          callback:(resp)=>{
            if(resp.error){showToast("❌ Auth failed: "+resp.error);return;}
            accessToken=resp.access_token;
            tokenExpiry=Date.now()+((resp.expires_in-60)*1000);
            loadExpenses();
          }
        });
        res(client);
      }
    },200);
  });
}

let tokenClient=null;
async function signIn(){
  if(!CFG.clientId||!CFG.sheetId){showToast("⚠️ Fill in Client ID and Sheet ID first.");return;}
  localStorage.setItem("yt_cfg2",JSON.stringify(CFG));
  if(!tokenClient) tokenClient=await initTokenClient();
  tokenClient.requestAccessToken();
}

async function ensureToken(){
  if(accessToken&&Date.now()<tokenExpiry) return true;
  if(!tokenClient) tokenClient=await initTokenClient();
  return new Promise(res=>{
    tokenClient.callback=(resp)=>{
      if(resp.error){showToast("❌ Session expired. Please sign in again.");res(false);return;}
      accessToken=resp.access_token;
      tokenExpiry=Date.now()+((resp.expires_in-60)*1000);
      res(true);
    };
    tokenClient.requestAccessToken({prompt:""});
  });
}

// ── SHEETS API ─────────────────────────────────────────
const BASE="https://sheets.googleapis.com/v4/spreadsheets";
async function apiGet(range){
  const r=await fetch(`${BASE}/${CFG.sheetId}/values/${encodeURIComponent(range)}`,
    {headers:{Authorization:"Bearer "+accessToken}});
  if(!r.ok) throw new Error(`GET failed: ${r.status} ${await r.text()}`);
  return r.json();
}
async function apiAppend(values){
  const r=await fetch(`${BASE}/${CFG.sheetId}/values/${encodeURIComponent(SHEET_NAME)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,
    {method:"POST",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},
     body:JSON.stringify({values})});
  if(!r.ok) throw new Error(`Append failed: ${r.status} ${await r.text()}`);
  return r.json();
}
async function apiUpdate(range,values){
  const r=await fetch(`${BASE}/${CFG.sheetId}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,
    {method:"PUT",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"},
     body:JSON.stringify({values})});
  if(!r.ok) throw new Error(`Update failed: ${r.status} ${await r.text()}`);
  return r.json();
}
async function apiClear(range){
  const r=await fetch(`${BASE}/${CFG.sheetId}/values/${encodeURIComponent(range)}:clear`,
    {method:"POST",headers:{Authorization:"Bearer "+accessToken,"Content-Type":"application/json"}});
  if(!r.ok) throw new Error(`Clear failed: ${r.status} ${await r.text()}`);
  return r.json();
}

async function loadExpenses(){
  setLoading(true,"Loading expenses...");
  state.view="dashboard";
  try{
    const data=await apiGet(`${SHEET_NAME}!A1:G`);
    const rows=data.values||[];
    if(!rows.length||rows[0][0]!=="ID"){
      await apiUpdate(`${SHEET_NAME}!A1:G1`,[HEADER]);
      state.expenses=[];
    } else {
      state.expenses=rows.slice(1).filter(r=>r[0]).map(r=>({
        id:r[0],date:r[1]||today(),desc:r[2]||"",
        amount:parseFloat(r[3])||0,cat:r[4]||"other",
        payer:r[5]||"Yagyansh",note:r[6]||""
      })).reverse();
    }
  }catch(e){showToast("❌ Load failed: "+e.message);}
  setLoading(false);render();
}

async function addExpense(exp){
  if(!await ensureToken()) return;
  setLoading(true,"Saving...");
  try{
    await apiAppend([[exp.id,exp.date,exp.desc,exp.amount,exp.cat,exp.payer,exp.note||""]]);
    state.expenses=[exp,...state.expenses];
    state.view="dashboard";
    showToast("✅ Saved!");
  }catch(e){showToast("❌ Save failed: "+e.message);}
  setLoading(false);render();
}

async function updateExpense(exp){
  if(!await ensureToken()) return;
  setLoading(true,"Updating...");
  try{
    const data=await apiGet(`${SHEET_NAME}!A1:G`);
    const rows=data.values||[];
    const idx=rows.findIndex(r=>r[0]===exp.id);
    if(idx>0) await apiUpdate(`${SHEET_NAME}!A${idx+1}:G${idx+1}`,[[exp.id,exp.date,exp.desc,exp.amount,exp.cat,exp.payer,exp.note||""]]);
    state.expenses=state.expenses.map(e=>e.id===exp.id?exp:e);
    state.view="history";state.editId=null;
    showToast("✅ Updated!");
  }catch(e){showToast("❌ Update failed: "+e.message);}
  setLoading(false);render();
}

async function deleteExpense(id){
  if(!await ensureToken()) return;
  setLoading(true,"Deleting...");
  try{
    const data=await apiGet(`${SHEET_NAME}!A1:G`);
    const rows=(data.values||[]).filter(r=>r[0]!==id);
    await apiClear(`${SHEET_NAME}!A1:G`);
    if(rows.length) await apiUpdate(`${SHEET_NAME}!A1:G${rows.length}`,rows);
    else await apiUpdate(`${SHEET_NAME}!A1:G1`,[HEADER]);
    state.expenses=state.expenses.filter(e=>e.id!==id);
    showToast("🗑️ Deleted!");
  }catch(e){showToast("❌ Delete failed: "+e.message);}
  setLoading(false);render();
}

// ── RENDER ─────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(state.view==="setup"||!accessToken){renderSetup();return;}
  const fe=filtered();
  const total=fe.reduce((s,e)=>s+e.amount,0);
  const todayStr=today();
  const todayExp=state.expenses.filter(e=>e.date===todayStr);
  const todayTotal=todayExp.reduce((s,e)=>s+e.amount,0);
  const yT=fe.filter(e=>e.payer==="Yagyansh").reduce((s,e)=>s+e.amount,0);
  const tT=fe.filter(e=>e.payer==="Tanu").reduce((s,e)=>s+e.amount,0);

  let html=`<div class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:13px;opacity:.85">💰 Expense Tracker</div>
        <div style="font-size:24px;font-weight:700;margin-top:2px">${fmt(total)}</div>
        <div style="font-size:12px;opacity:.75">${MONTHS[state.filterMonth]} ${state.filterYear} total</div>
        ${state.userEmail?`<div class="user-pill">👤 ${state.userEmail}</div>`:""}
      </div>
      <div style="text-align:right">
        <div style="font-size:12px;opacity:.75">Today</div>
        <div style="font-size:18px;font-weight:600">${fmt(todayTotal)}</div>
        <div style="font-size:11px;opacity:.7">${todayExp.length} txn${todayExp.length!==1?"s":""}</div>
        <button onclick="signOut()" style="margin-top:6px;padding:3px 10px;border-radius:10px;border:none;background:rgba(255,255,255,.2);color:#fff;font-size:11px">Sign out</button>
      </div>
    </div>
    <div class="month-scroll">${MONTHS.map((m,i)=>`<button class="month-btn${state.filterMonth===i?" active":""}" onclick="setMonth(${i})">${m}</button>`).join("")}</div>
  </div>
  <div class="cards">
    <div class="card"><div style="font-size:18px">📅</div><div style="font-size:15px;font-weight:700;color:#333;margin-top:3px">${fmt(total)}</div><div style="font-size:11px;color:#666">Month</div></div>
    <div class="card"><div style="font-size:18px">👤</div><div style="font-size:15px;font-weight:700;color:#667eea;margin-top:3px">${fmt(yT)}</div><div style="font-size:11px;color:#666">Yagyansh</div></div>
    <div class="card"><div style="font-size:18px">👩</div><div style="font-size:15px;font-weight:700;color:#e91e8c;margin-top:3px">${fmt(tT)}</div><div style="font-size:11px;color:#666">Tanu</div></div>
  </div>
  <div class="nav">
    <button class="nav-btn${state.view==="dashboard"?" active":""}" onclick="setView('dashboard')">🏠 Home</button>
    <button class="nav-btn${state.view==="history"?" active":""}" onclick="setView('history')">📋 History</button>
    <button class="nav-btn${state.view==="stats"?" active":""}" onclick="setView('stats')">📊 Stats</button>
  </div>
  <div class="content">`;

  if(state.view==="dashboard") html+=renderDashboard(fe,todayExp,yT,tT,total);
  else if(state.view==="add") html+=renderAddForm();
  else if(state.view==="history") html+=renderHistory(fe);
  else if(state.view==="stats") html+=renderStats(fe,total);
  html+=`</div>`;
  if(state.view!=="add"){
    html+=`<button class="fab" onclick="setView('add')">+</button>`;
    html+=`<button class="sync-btn" onclick="syncNow()">🔄</button>`;
  }
  app.innerHTML=html;
}

function renderSetup(){
  document.getElementById("app").innerHTML=`
  <div class="setup-wrap">
    <div class="setup-card">
      <div class="setup-logo">💰</div>
      <div class="setup-title">Expense Tracker</div>
      <div class="setup-sub">Yagyansh & Tanu<br/>Sign in with Google to sync expenses</div>
      <div class="setup-lbl">OAuth Client ID</div>
      <input class="setup-inp" id="s_cid" placeholder="xxxx.apps.googleusercontent.com" value="${CFG.clientId||''}"/>
      <div class="setup-lbl">Google Sheet ID</div>
      <input class="setup-inp" id="s_sid" placeholder="1BxiMV..." value="${CFG.sheetId||''}"/>
      <button class="signin-btn" onclick="saveAndSignIn()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.8 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.3-.2-2.7-.5-4z"/></svg>
        Sign in with Google
      </button>
      <div class="setup-hint">Your credentials are saved on this device only.<br/>Both Yagyansh & Tanu sign in with the same Google account that owns the Sheet.</div>
    </div>
  </div>`;
}

function renderDashboard(fe,todayExp,yT,tT,total){
  const ct=CATS.map(c=>({...c,total:fe.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const max=ct[0]?.total||1;
  let h=`<div class="payer-split">
    <div class="payer-split-card"><div style="font-size:22px">👤</div><div style="font-size:13px;font-weight:700;color:#667eea">Yagyansh</div><div style="font-size:17px;font-weight:700;color:#667eea">${fmt(yT)}</div><div style="font-size:11px;color:#aaa">${fe.filter(e=>e.payer==="Yagyansh").length} entries</div></div>
    <div class="payer-split-card"><div style="font-size:22px">👩</div><div style="font-size:13px;font-weight:700;color:#e91e8c">Tanu</div><div style="font-size:17px;font-weight:700;color:#e91e8c">${fmt(tT)}</div><div style="font-size:11px;color:#aaa">${fe.filter(e=>e.payer==="Tanu").length} entries</div></div>
  </div>`;
  if(ct.length){
    h+=`<div class="section-card"><div class="section-title">Top Categories</div>`;
    ct.slice(0,5).forEach(c=>{h+=`<div class="bar-row"><div class="bar-meta"><span>${c.icon} ${c.label}</span><span style="font-weight:600">${fmt(c.total)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(c.total/max*100).toFixed(1)}%;background:${c.color}"></div></div></div>`;});
    h+=`</div>`;
  }
  h+=`<div class="section-card"><div class="section-title">Today's Transactions</div>`;
  if(!todayExp.length) h+=`<div class="empty">No expenses today.<br>Tap + to add!</div>`;
  else todayExp.forEach(e=>{h+=expRow(e);});
  h+=`</div>`;
  return h;
}

function renderAddForm(){
  const e=state.editId?state.expenses.find(x=>x.id===state.editId):null;
  const desc=e?.desc||"",amt=e?.amount||"",dt=e?.date||today(),note=e?.note||"";
  if(e){_selCat=e.cat;_selPayer=e.payer;}
  return `<div class="form-card">
    <div style="font-weight:700;font-size:16px;color:#333;margin-bottom:14px">${e?"✏️ Edit":"➕ Add Expense"}</div>
    <div class="lbl">Description</div>
    <input class="inp" id="f_desc" value="${desc}" placeholder="e.g. BigBasket groceries"/>
    <div class="lbl">Amount (₹)</div>
    <input class="inp" id="f_amt" type="number" value="${amt}" placeholder="0.00"/>
    <div class="lbl">Paid By</div>
    <div class="payer-grid">${PAYERS.map(p=>`<button class="payer-btn" id="pb_${p}" style="border-color:${_selPayer===p?PC[p]:"#eee"};background:${_selPayer===p?PC[p]+"18":"#fafafa"};color:${_selPayer===p?PC[p]:"#555"}" onclick="selPayer('${p}')">${p}</button>`).join("")}</div>
    <div class="lbl">Category</div>
    <div class="cat-grid">${CATS.map(c=>`<button class="cat-btn" id="cb_${c.id}" style="border-color:${_selCat===c.id?c.color:"#eee"};background:${_selCat===c.id?c.color+"18":"#fafafa"};color:${_selCat===c.id?c.color:"#555"}" onclick="selCat('${c.id}')">${c.icon} ${c.label}</button>`).join("")}</div>
    <div class="lbl">Date</div>
    <input class="inp" id="f_date" type="date" value="${dt}"/>
    <div class="lbl">Note (optional)</div>
    <input class="inp" id="f_note" value="${note}" placeholder="Any note..."/>
    <div class="btn-row">
      <button class="btn-cancel" onclick="setView('dashboard')">Cancel</button>
      <button class="btn-save" onclick="saveExpense('${e?.id||""}')">${e?"Update":"Save"}</button>
    </div>
  </div>`;
}

function renderHistory(fe){
  let list=fe.filter(e=>{
    const sc=state.histSearch.toLowerCase();
    return(state.histCat==="all"||e.cat===state.histCat)&&(state.histPayer==="all"||e.payer===state.histPayer)&&(e.desc.toLowerCase().includes(sc)||(e.note||"").toLowerCase().includes(sc));
  });
  let h=`<input class="inp" style="background:#fff;margin-bottom:10px" placeholder="🔍 Search..." value="${state.histSearch}" oninput="setHS(this.value)"/>
  <div class="chips"><button class="chip" style="${state.histPayer==="all"?"border-color:#667eea;background:#667eea;color:#fff":""}" onclick="setHP('all')">All</button>${PAYERS.map(p=>`<button class="chip" style="${state.histPayer===p?`border-color:${PC[p]};background:${PC[p]};color:#fff`:""}" onclick="setHP('${p}')">${p}</button>`).join("")}</div>
  <div class="chips"><button class="chip" style="${state.histCat==="all"?"border-color:#667eea;background:#667eea;color:#fff":""}" onclick="setHC('all')">All</button>${CATS.map(c=>`<button class="chip" style="${state.histCat===c.id?`border-color:${c.color};background:${c.color};color:#fff`:""}" onclick="setHC('${c.id}')">${c.icon} ${c.label}</button>`).join("")}</div>
  <div class="section-card" style="padding:4px 16px">`;
  if(!list.length) h+=`<div class="empty">No expenses found.</div>`;
  else list.forEach(e=>{h+=expRow(e);});
  h+=`</div>`;
  return h;
}

function renderStats(fe,total){
  const ct=CATS.map(c=>({...c,total:fe.filter(e=>e.cat===c.id).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const days={};fe.forEach(e=>{days[e.date]=(days[e.date]||0)+e.amount;});
  const avg=Object.keys(days).length?(total/Object.keys(days).length).toFixed(0):0;
  const yT=fe.filter(e=>e.payer==="Yagyansh").reduce((s,e)=>s+e.amount,0);
  const tT=fe.filter(e=>e.payer==="Tanu").reduce((s,e)=>s+e.amount,0);
  const bT=fe.filter(e=>e.payer==="Both").reduce((s,e)=>s+e.amount,0);
  return `<div class="stats-grid">
    <div class="stat-card"><div style="font-size:20px">💸</div><div style="font-size:18px;font-weight:700;color:#333;margin-top:4px">${fmt(total)}</div><div style="font-size:12px;color:#888">Total Spent</div></div>
    <div class="stat-card"><div style="font-size:20px">📆</div><div style="font-size:18px;font-weight:700;color:#333;margin-top:4px">${fmt(avg)}</div><div style="font-size:12px;color:#888">Avg / Day</div></div>
    <div class="stat-card"><div style="font-size:20px">🧾</div><div style="font-size:18px;font-weight:700;color:#333;margin-top:4px">${fe.length}</div><div style="font-size:12px;color:#888">Transactions</div></div>
    <div class="stat-card"><div style="font-size:20px">🏷️</div><div style="font-size:18px;font-weight:700;color:#333;margin-top:4px">${ct.length}</div><div style="font-size:12px;color:#888">Categories</div></div>
  </div>
  <div class="section-card"><div class="section-title">Who Paid More?</div>
    ${[["Yagyansh",yT,"#667eea","👤"],["Tanu",tT,"#e91e8c","👩"],["Both",bT,"#4CAF50","👫"]].map(([n,v,c,ic])=>`<div class="bar-row"><div class="bar-meta"><span>${ic} ${n}</span><span style="font-weight:600;color:${c}">${fmt(v)} <span style="color:#aaa;font-weight:400">(${total?(v/total*100).toFixed(1):0}%)</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${total?(v/total*100).toFixed(1):0}%;background:${c}"></div></div></div>`).join("")}
  </div>
  <div class="section-card"><div class="section-title">By Category</div>
    ${!ct.length?'<div class="empty">No data.</div>':ct.map(c=>`<div class="bar-row"><div class="bar-meta"><span>${c.icon} ${c.label}</span><span style="font-weight:600">${fmt(c.total)} <span style="color:#aaa;font-weight:400">(${total?(c.total/total*100).toFixed(1):0}%)</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${total?(c.total/total*100).toFixed(1):0}%;background:${c.color}"></div></div></div>`).join("")}
  </div>
  ${Object.keys(days).length?`<div class="section-card"><div class="section-title">Top Spending Days</div>${Object.entries(days).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([d,v])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px"><span style="color:#555">${new Date(d).toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"})}</span><span style="font-weight:700">${fmt(v)}</span></div>`).join("")}</div>`:""}`;
}

function expRow(e){
  const c=catOf(e.cat);const pc=PC[e.payer]||"#999";
  return `<div class="exp-row">
    <div class="exp-icon" style="background:${c.color}22">${c.icon}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:14px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.desc}</div>
      <div style="font-size:11px;color:#aaa">${new Date(e.date).toLocaleDateString("en-IN",{day:"numeric",month:"short"})} · ${c.label}</div>
      ${e.note?`<div style="font-size:11px;color:#bbb;font-style:italic">${e.note}</div>`:""}
      <span class="exp-payer" style="background:${pc}18;color:${pc}">${e.payer}</span>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-weight:700;font-size:15px;color:#333">${fmt(e.amount)}</div>
      <div style="display:flex;gap:5px;margin-top:4px;justify-content:flex-end">
        <button class="action-btn" onclick="editExp('${e.id}')">✏️</button>
        <button class="action-btn del-btn" onclick="delExp('${e.id}')">🗑️</button>
      </div>
    </div>
  </div>`;
}

// ── ACTIONS ────────────────────────────────────────────
const filtered=()=>state.expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===state.filterMonth&&d.getFullYear()===state.filterYear;});
function setMonth(m){state.filterMonth=m;render();}
function setView(v){state.view=v;if(v==="add"&&!state.editId){_selCat="grocery";_selPayer="Yagyansh";}if(v!=="add")state.editId=null;render();}
function setHS(v){state.histSearch=v;render();}
function setHC(v){state.histCat=v;render();}
function setHP(v){state.histPayer=v;render();}

function selCat(id){_selCat=id;CATS.forEach(c=>{const b=document.getElementById("cb_"+c.id);if(!b)return;b.style.borderColor=c.id===id?c.color:"#eee";b.style.background=c.id===id?c.color+"18":"#fafafa";b.style.color=c.id===id?c.color:"#555";});}
function selPayer(p){_selPayer=p;PAYERS.forEach(x=>{const b=document.getElementById("pb_"+x);if(!b)return;b.style.borderColor=x===p?PC[x]:"#eee";b.style.background=x===p?PC[x]+"18":"#fafafa";b.style.color=x===p?PC[x]:"#555";});}

async function saveExpense(editId){
  const desc=document.getElementById("f_desc")?.value?.trim();
  const amt=parseFloat(document.getElementById("f_amt")?.value);
  const date=document.getElementById("f_date")?.value;
  const note=document.getElementById("f_note")?.value?.trim()||"";
  if(!desc){showToast("⚠️ Enter a description.");return;}
  if(!amt||amt<=0){showToast("⚠️ Enter a valid amount.");return;}
  const exp={id:editId||genId(),desc,amount:amt,cat:_selCat,date,note,payer:_selPayer};
  if(editId) await updateExpense(exp);
  else await addExpense(exp);
}

function editExp(id){state.editId=id;state.view="add";render();}
async function delExp(id){if(!confirm("Delete this expense?"))return;await deleteExpense(id);}
async function syncNow(){await loadExpenses();showToast("🔄 Synced!");}

function saveAndSignIn(){
  const cid=document.getElementById("s_cid")?.value?.trim();
  const sid=document.getElementById("s_sid")?.value?.trim();
  if(!cid||!sid){showToast("⚠️ Fill both fields.");return;}
  CFG={clientId:cid,sheetId:sid};
  localStorage.setItem("yt_cfg2",JSON.stringify(CFG));
  signIn();
}

function signOut(){
  accessToken=null;tokenClient=null;
  state.view="setup";state.expenses=[];
  google.accounts.oauth2.revoke(accessToken,()=>{});
  render();
}

// ── INIT ───────────────────────────────────────────────
render();
</script>
</body>
</html>
